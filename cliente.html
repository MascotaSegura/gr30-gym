<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Perfil | GR30.</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="only light">
  <meta name="description" content="Perfil de miembro de GR30.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
</head>
<body class="font-sans bg-brand-white text-brand-black antialiased selection:bg-brand-green selection:text-brand-black min-h-[100svh] flex flex-col overflow-x-hidden">
  
  <header style="background-color: #ffffff !important;" class="w-full bg-brand-white border-b-4 border-brand-black flex items-center justify-between px-6 lg:px-12 py-5 flex-shrink-0 relative z-50">
    <a href="index.html" class="text-3xl font-display font-bold tracking-tighter uppercase flex items-center gap-3 group focus:outline-none" aria-label="Ir al inicio">
      <div class="w-10 h-10 bg-brand-green text-brand-black flex items-center justify-center flex-shrink-0 group-hover:bg-brand-black group-hover:text-brand-white group-focus:bg-brand-black group-focus:text-brand-white group-active:bg-brand-black group-active:text-brand-white transition-colors">
        <span class="text-2xl leading-none">G</span>
      </div>
      <span class="text-brand-black">GR30<span class="text-brand-green group-hover:text-brand-black group-active:text-brand-black transition-colors">.</span></span>
    </a>
    <button onclick="logout()" class="hidden sm:flex bg-brand-black text-brand-white hover:bg-brand-green hover:text-brand-black focus:bg-brand-green focus:text-brand-black active:bg-brand-green active:text-brand-black transition-colors px-6 py-3 font-display font-bold uppercase tracking-widest text-xs items-center gap-2 focus:outline-none">
      Cerrar Sesión <i class="ph-bold ph-sign-out text-lg"></i>
    </button>
  </header>

  <main class="flex-1 w-full max-w-4xl mx-auto p-6 sm:p-12">
    <div id="loading" class="flex items-center justify-center py-24">
      <div class="font-display font-bold text-3xl sm:text-4xl uppercase tracking-widest text-brand-black animate-pulse bg-brand-green px-6 py-4 border-4 border-brand-black">Cargando...</div>
    </div>
    
    <div id="client-content" class="hidden flex-col gap-8">
      
            <div class="hidden sm:flex w-full bg-brand-black gap-1 border-4 border-brand-black mb-4">
        <button onclick="setTab('resumen')" id="tab-desk-resumen" class="flex-1 py-4 font-display font-bold uppercase tracking-widest text-sm bg-brand-green text-brand-black hover:bg-brand-green hover:text-brand-black focus:outline-none transition-colors">Resumen</button>
        <button onclick="setTab('historial')" id="tab-desk-historial" class="flex-1 py-4 font-display font-bold uppercase tracking-widest text-sm bg-brand-white text-brand-black hover:bg-brand-green hover:text-brand-black focus:outline-none transition-colors">Historial de Pagos</button>
      </div>

            <div id="view-resumen" class="flex flex-col gap-12">
        <div class="flex flex-col mb-4">
          <p class="font-display font-bold uppercase tracking-widest text-brand-black text-xl sm:text-2xl mb-1">Hola,</p>
          <h1 id="c-nombre" class="text-[clamp(3.5rem,8vw,6rem)] leading-none font-display font-bold uppercase tracking-tighter text-brand-green break-words">...</h1>
        </div>

        <div id="alert-section" class="hidden bg-brand-green text-brand-black border-4 border-brand-black p-4 sm:p-6 flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
          <div>
            <h2 class="text-2xl font-display font-bold uppercase tracking-widest text-brand-black mb-2 flex items-center gap-2"><i class="ph-bold ph-warning"></i> Pago Pendiente</h2>
            <p class="font-bold text-lg leading-relaxed">Tu plan actual requiere regularización. Acércate a recepción para evitar la suspensión de tu acceso.</p>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 sm:gap-6">
          <div class="flex-1 bg-brand-white border-4 border-brand-black p-4 sm:p-6 flex flex-col justify-center">
            <p class="text-xs font-display font-bold uppercase tracking-widest text-brand-black mb-2">Plan Actual</p>
            <p id="c-plan" class="text-xl sm:text-2xl font-display font-bold uppercase tracking-widest text-brand-black break-words">...</p>
          </div>
          <div class="flex flex-row gap-4 sm:gap-6 flex-1">
            <div class="flex-1 bg-brand-white border-4 border-brand-black p-4 sm:p-6 flex flex-col justify-center">
              <p class="text-xs font-display font-bold uppercase tracking-widest text-brand-black mb-2">Estado</p>
              <div id="c-estado">...</div>
            </div>
            <div class="flex-1 bg-brand-white border-4 border-brand-black p-4 sm:p-6 flex flex-col justify-center">
              <p class="text-xs font-display font-bold uppercase tracking-widest text-brand-black mb-2">Vence</p>
              <p id="c-venc" class="text-xl sm:text-2xl font-display font-bold uppercase tracking-widest text-brand-black">...</p>
            </div>
          </div>
        </div>
      </div>

            <div id="view-historial" class="hidden flex-col gap-6">
        <h2 class="text-3xl font-display font-bold uppercase tracking-tighter mb-2 text-brand-black border-b-4 border-brand-black pb-4">Tus Pagos.</h2>
        <div id="historial-container" class="flex flex-col gap-4">
                  </div>
      </div>

            <div class="h-24 sm:hidden flex-shrink-0 w-full"></div>
    </div>
  </main>

    <nav class="fixed bottom-0 left-0 w-full flex sm:hidden bg-brand-black border-t-4 border-brand-black gap-1 z-50">
    <button onclick="setTab('resumen')" id="btn-resumen" class="flex-1 flex flex-col items-center justify-center py-4 bg-brand-green text-brand-black focus:outline-none transition-colors">
      <i class="ph-bold ph-squares-four text-2xl mb-1"></i>
      <span class="font-display font-bold text-xs uppercase tracking-widest mt-1">Resumen</span>
    </button>
    <button onclick="setTab('historial')" id="btn-historial" class="flex-1 flex flex-col items-center justify-center py-4 bg-brand-white text-brand-black focus:outline-none transition-colors">
      <i class="ph-bold ph-clock-counter-clockwise text-2xl mb-1"></i>
      <span class="font-display font-bold text-xs uppercase tracking-widest mt-1">Pagos</span>
    </button>
    <button onclick="logout()" class="flex-1 flex flex-col items-center justify-center py-4 bg-brand-white text-brand-black focus:outline-none transition-colors">
      <i class="ph-bold ph-sign-out text-2xl mb-1"></i>
      <span class="font-display font-bold text-xs uppercase tracking-widest mt-1">Salir</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/audio.js"></script>
  <script src="assets/js/sysModal.js"></script>
  <script>
    let sessionData = null;
    try {
      sessionData = JSON.parse(localStorage.getItem('gr30_client_session'));
    } catch(e) {}
    
    if (!sessionData || !sessionData.phone || !sessionData.pass) {
      window.location.href = 'login.html';
    }

    function logout() {
      localStorage.removeItem('gr30_client_session');
      window.location.href = 'login.html';
    }

    function setTab(tab) {
      const views = ['resumen', 'historial'];
      views.forEach(v => {
        const viewEl = document.getElementById('view-' + v);
        const deskBtn = document.getElementById('tab-desk-' + v);
        const mobBtn = document.getElementById('btn-' + v);

        if (v === tab) {
          viewEl.classList.remove('hidden');
          viewEl.classList.add('flex');
          if (deskBtn) { deskBtn.classList.remove('bg-brand-white'); deskBtn.classList.add('bg-brand-green'); }
          if (mobBtn) { mobBtn.classList.remove('bg-brand-white'); mobBtn.classList.add('bg-brand-green'); }
        } else {
          viewEl.classList.remove('flex');
          viewEl.classList.add('hidden');
          if (deskBtn) { deskBtn.classList.remove('bg-brand-green'); deskBtn.classList.add('bg-brand-white'); }
          if (mobBtn) { mobBtn.classList.remove('bg-brand-green'); mobBtn.classList.add('bg-brand-white'); }
        }
      });
    }

    async function loadClientData() {
      try {
       
        const { data: member, error } = await window.supabaseClient.from('miembros')
          .select('*')
          .eq('telefono', sessionData.phone)
          .eq('password', sessionData.pass)
          .single();
          
        if (error || !member) {
          logout();
          return;
        }

        document.getElementById('c-nombre').textContent = member.nombre;
        document.getElementById('c-plan').textContent = member.plan;

        let badge = '';
        if (member.estado_pago === 'al_dia') {
          badge = '<span class="bg-brand-green text-brand-black font-display font-bold uppercase tracking-widest text-xs px-2 py-1 inline-block border-4 border-brand-black">Al Día</span>';
        } else if (member.estado_pago === 'atrasado') {
          badge = '<span class="bg-brand-black text-brand-white font-display font-bold uppercase tracking-widest text-xs px-2 py-1 inline-flex items-center gap-1 whitespace-nowrap border-4 border-brand-black"><i class="ph-bold ph-warning text-sm"></i> Atrasado</span>';
          document.getElementById('alert-section').classList.remove('hidden');
          document.getElementById('alert-section').classList.add('flex');
        } else {
          badge = '<span class="bg-brand-white text-brand-black font-display font-bold uppercase tracking-widest text-xs px-2 py-1 inline-block border-4 border-brand-black">Pendiente</span>';
          document.getElementById('alert-section').classList.remove('hidden');
          document.getElementById('alert-section').classList.add('flex');
        }
        document.getElementById('c-estado').innerHTML = badge;

       
        const { data: pagos } = await window.supabaseClient.from('pagos').select('*').eq('miembro_id', member.id).order('fecha', { ascending: false });
        
        let venc = '-';
        if (pagos && pagos.length > 0) {
         
          const parts = pagos[0].fecha.split('-');
          if (parts.length === 3) {
            let year = parseInt(parts[0]);
            let month = parseInt(parts[1]);
            let day = parseInt(parts[2]);
            month += 1;
            if (month > 12) { month = 1; year += 1; }
            venc = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
          }
        }
        document.getElementById('c-venc').textContent = venc;

        const histContainer = document.getElementById('historial-container');
        if (!pagos || pagos.length === 0) {
          histContainer.innerHTML = '<div class="bg-brand-white border-4 border-brand-black p-6 font-bold uppercase tracking-widest text-sm text-brand-black text-center">No hay pagos registrados.</div>';
        } else {
          histContainer.innerHTML = pagos.map(p => `
            <div class="bg-brand-white border-4 border-brand-black p-4 sm:p-6 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
              <div>
                <p class="font-display font-bold text-xl uppercase text-brand-black">${p.monto} mxn</p>
                <p class="text-xs font-bold uppercase tracking-widest text-brand-black mt-1">${p.metodo}</p>
              </div>
              <div class="font-display font-bold uppercase tracking-widest text-sm bg-brand-black text-brand-white px-4 py-2 text-center whitespace-nowrap">
                ${p.fecha}
              </div>
            </div>
          `).join('');
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('client-content').classList.remove('hidden');
        document.getElementById('client-content').classList.add('flex');

      } catch (err) {
        document.getElementById('loading').innerHTML = `
          <div class="flex flex-col items-center gap-4 text-center">
            <i class="ph-bold ph-warning text-5xl text-brand-black"></i>
            <p class="font-display font-bold uppercase tracking-widest text-brand-black text-xl">Error de conexi\u00f3n.</p>
            <button onclick="logout()" class="mt-4 font-display font-bold uppercase tracking-widest text-xs bg-brand-black text-brand-white hover:bg-brand-green hover:text-brand-black transition-colors px-6 py-3 focus:outline-none">Salir y Reintentar</button>
          </div>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', loadClientData);
  </script>
</body>
</html>
